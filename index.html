<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hafizh Abdan Dzikri Portfolio</title>

<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Satoshi', sans-serif;
  background: #10367D;
  color: #FFFFFF;
}

html { scroll-behavior: smooth; }

/* NAVBAR PREMIUM */
nav {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50px;
  padding: 10px 20px;
  z-index: 100;
}

/* NAV MENU */
#navMenu {
  display: flex;
  gap: 20px;
  position: relative;
}

/* NAV LINK */
.nav-link {
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  opacity: 0.7;
  transition: 0.3s;
}

.nav-link:hover {
  opacity: 1;
  transform: translateY(-2px);
}

.nav-link.active { opacity: 1; }

/* INDICATOR */
.indicator {
  position: absolute;
  bottom: -6px;
  height: 3px;
  background: #FFFFFF;
  border-radius: 10px;
  transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

/* SECTION FULL WIDTH */
.section {
  width: 100%;
  padding: 120px 20px;
}

/* CONTENT WRAPPER */
.container {
  max-width: 1100px;
  margin: auto;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* RESPONSIVE TITLE */
.hero-title {
  font-size: clamp(32px, 6vw, 64px);
  font-weight: 700;
}

/* CARD */
.card {
  background: #FFFFFF;
  color: #10367D;
  padding: 20px;
  border-radius: 16px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

/* GRID RESPONSIVE */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

@media(min-width:768px){
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(40px);
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
  transition: 0.8s;
}

/* MODAL */
#modal {
  backdrop-filter: blur(5px);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div id="navMenu">
    <a href="#home" class="nav-link active">Home</a>
    <a href="#projects" class="nav-link">Projects</a>
    <a href="#experience" class="nav-link">Experience</a>
    <a href="#skills" class="nav-link">Skills</a>
    <a href="#courses" class="nav-link">Courses</a>
    <div class="indicator" id="indicator"></div>
  </div>
</nav>

<!-- HERO -->
<section id="home" class="hero section">
  <div class="container">
    <h1 class="hero-title fade">Hi, I'm Hafizh</h1>
    <p id="typing" class="mt-4 fade"></p>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="section">
  <div class="container">
    <h2 class="text-3xl md:text-4xl font-bold mb-10 fade">Projects</h2>

    <div class="grid">
      <div class="card fade cursor-pointer" onclick="openModal('p1')">
        <h3 class="font-bold">Customer Deposit Prediction</h3>
        <p>Machine learning model.</p>
      </div>

      <div class="card fade cursor-pointer" onclick="openModal('p2')">
        <h3 class="font-bold">Sentiment Analysis</h3>
        <p>NLP model.</p>
      </div>
    </div>
  </div>
</section>

<!-- EXPERIENCE -->
<section id="experience" class="section">
  <div class="container">
    <h2 class="text-3xl md:text-4xl font-bold mb-10 fade">Experience</h2>
    <p class="fade">BCA Syariah — Product Development Intern</p>
  </div>
</section>

<!-- SKILLS -->
<section id="skills" class="section">
  <div class="container">
    <h2 class="text-3xl md:text-4xl font-bold mb-10 fade">Skills</h2>
    <p class="fade">Python, SQL, Excel</p>
  </div>
</section>

<!-- COURSES -->
<section id="courses" class="section">
  <div class="container">
    <h2 class="text-3xl md:text-4xl font-bold mb-10 fade">Courses</h2>
    <p class="fade">Add your courses</p>
  </div>
</section>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50">
  <div class="bg-white text-[#10367D] p-6 rounded-xl max-w-md w-full relative">
    <button onclick="closeModal()" class="absolute top-3 right-4">✕</button>
    <h2 id="modalTitle" class="font-bold text-xl mb-3"></h2>
    <p id="modalDesc"></p>
  </div>
</div>

<script>
const links = document.querySelectorAll('.nav-link');
const indicator = document.getElementById('indicator');
const sections = document.querySelectorAll('section');

function moveIndicator(el) {
  indicator.style.width = el.offsetWidth + 'px';
  indicator.style.left = el.offsetLeft + 'px';
}

function setActive(link) {
  links.forEach(l => l.classList.remove('active'));
  link.classList.add('active');
  moveIndicator(link);
}

links.forEach(link => {
  link.addEventListener('click', () => setActive(link));
});

window.addEventListener('scroll', () => {
  let current = "";
  sections.forEach(section => {
    const top = section.offsetTop - 150;
    if (scrollY >= top) current = section.id;
  });

  links.forEach(link => {
    if (link.getAttribute("href") === "#" + current) {
      setActive(link);
    }
  });
});

window.onload = () => moveIndicator(links[0]);

const fades = document.querySelectorAll('.fade');

function showOnScroll() {
  fades.forEach(el => {
    if (el.getBoundingClientRect().top < window.innerHeight * 0.85) {
      el.classList.add('show');
    }
  });
}

window.addEventListener('scroll', showOnScroll);
showOnScroll();

const text = "Math Student | Ex-Product Development Intern at BCA Syariah";
let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text[i];
    i++;
    setTimeout(typeWriter, 40);
  }
}
typeWriter();

const projectData = {
  p1: { title:"Customer Deposit Prediction", desc:"ML model" },
  p2: { title:"Sentiment Analysis", desc:"NLP model" }
};

function openModal(id) {
  const data = projectData[id];
  document.getElementById("modalTitle").innerText = data.title;
  document.getElementById("modalDesc").innerText = data.desc;
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal").classList.add("flex");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hafizh Portfolio</title>

  <!-- FONT -->
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <style>
    body {
      font-family: 'Satoshi', sans-serif;
      margin: 0;
      background: #F8FAFC;
      color: #384959;
      overflow-x: hidden;
    }

    html {
      scroll-behavior: smooth;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      width: 100%;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.6);
      border-bottom: 1px solid #eee;
      z-index: 10;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .menu a {
      margin-left: 20px;
      text-decoration: none;
      color: #384959;
      font-weight: 500;
    }

    .menu a:hover {
      color: #88BDF2;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .hero-title {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .hero-subtitle {
      margin-top: 10px;
      color: #6A89A7;
      font-size: 18px;
    }

    /* SECTION */
    .section {
      padding: 120px 20px;
    }

    .bg-soft {
      background: #BDDDDC;
    }

    /* CARDS */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      transition: all 0.4s ease;
    }

    .card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    /* CURSOR */
    .cursor {
      width: 20px;
      height: 20px;
      border: 2px solid #384959;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transition: transform 0.15s ease;
      z-index: 999;
    }
  </style>
</head>

<body>

  <div class="cursor"></div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container" style="display:flex; justify-content:space-between;">
      <h1>Hafizh</h1>
      <div class="menu">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section id="home" class="hero">
    <h1 class="hero-title">Hafizh 'Abdan</h1>
    <p class="hero-subtitle">Aspiring Data Scientist</p>
  </section>

  <!-- ABOUT -->
  <section id="about" class="section">
    <div class="container">
      <h2>About</h2>
      <p>
        Mathematics student passionate about data science, analytics, and building impactful models.
      </p>
    </div>
  </section>

  <!-- PROJECTS -->
  <section id="projects" class="section bg-soft">
    <div class="container">
      <h2>Projects</h2>

      <div class="grid">
        <div class="card">Customer Deposit Prediction</div>
        <div class="card">Sentiment Analysis</div>
      </div>
    </div>
  </section>

  <script>
    // REGISTER GSAP
    gsap.registerPlugin(ScrollTrigger);

    // HERO ANIMATION
    gsap.from(".hero-title", {
      y: 120,
      opacity: 0,
      duration: 1.2,
      ease: "power4.out"
    });

    gsap.from(".hero-subtitle", {
      y: 50,
      opacity: 0,
      duration: 1,
      delay: 0.2,
      ease: "power3.out"
    });

    // CARD ANIMATION
    gsap.utils.toArray(".card").forEach((card, i) => {
      gsap.from(card, {
        scrollTrigger: {
          trigger: card,
          start: "top 85%"
        },
        y: 80,
        opacity: 0,
        duration: 1,
        delay: i * 0.2,
        ease: "power3.out"
      });
    });

    // CUSTOM CURSOR
    const cursor = document.querySelector(".cursor");

    document.addEventListener("mousemove", e => {
      cursor.style.left = e.clientX + "px";
      cursor.style.top = e.clientY + "px";
    });
  </script>

</body>
</html>
